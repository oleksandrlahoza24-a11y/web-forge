<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random GIF Roller</title>
    <style>
        /* Base styles optimized for iPad */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        #container {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        /* The GIF display area */
        #gif-display {
            width: 100%;
            height: 400px;
            margin-bottom: 30px;
            border-radius: 20px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 4px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #gif-display img {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* Large, touchable button */
        #roll-button {
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(110, 142, 251, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-tap-highlight-color: transparent; /* Removes blue box on tap */
        }

        #roll-button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(110, 142, 251, 0.2);
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }

        /* Loading spinner */
        .loader {
            border: 5px solid #333;
            border-top: 5px solid #6e8efb;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="gif-display">
            <div id="placeholder">Tap Roll to Start!</div>
        </div>

        <button id="roll-button" onclick="rollGif()">ROLL GIF!</button>
        <div id="status">Powered by GIPHY</div>
    </div>

    <script>
        // Using a public beta API key for demonstration
        const API_KEY = 'dc6zaTOxFJmzC'; 
        const display = document.getElementById('gif-display');
        const button = document.getElementById('roll-button');

        async function rollGif() {
            // UI Feedback: Disable button and show loader
            button.disabled = true;
            button.innerText = "ROLLING...";
            display.innerHTML = '<div class="loader"></div>';

            try {
                // Fetch a random GIF from Giphy
                const response = await fetch(`https://api.giphy.com/v1/gifs/random?api_key=${API_KEY}&tag=&rating=g`);
                const result = await response.json();

                if (result.data && result.data.images.original.url) {
                    const gifUrl = result.data.images.original.url;
                    
                    // Preload the image so it doesn't flicker
                    const img = new Image();
                    img.src = gifUrl;
                    img.onload = () => {
                        display.innerHTML = `<img src="${gifUrl}" alt="Random GIF">`;
                        resetButton();
                    };
                } else {
                    throw new Error("No GIF found");
                }
            } catch (error) {
                console.error(error);
                display.innerHTML = "<div>Error fetching GIF. Try again!</div>";
                resetButton();
            }
        }

        function resetButton() {
            button.disabled = false;
            button.innerText = "ROLL GIF!";
        }

        // Prevent zooming on double-tap (common iPad issue)
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
